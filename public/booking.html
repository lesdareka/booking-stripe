<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<style>
body{
  font-family: Helvetica, Arial, sans-serif;
  color:#6b1f2b;
  max-width:420px;
  margin:40px auto;
}

h2{margin-bottom:20px;}

/* CALENDAR HEADER */
.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  font-weight:600;
}

/* CALENDAR */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
  font-size:12px;
  text-align:center;
}

.day {
  padding:8px;
  border:1px solid #ddd;
  cursor:pointer;
  opacity:0.3;
}

.day.active {
  border:1px solid #6b1f2b;
  opacity:1;
  background:#6b1f2b;
  color:white;
}

.day.allowed {
  opacity:1;
}

.day.disabled {
  opacity:0.15;
  pointer-events:none;
}

/* blocks */
.block{
  border-bottom:1px solid #6b1f2b;
  padding:16px 0;
}

/* tickets */
.counter {
  display:flex;
  gap:12px;
  align-items:center;
}

.small-label{
  font-size:13px;
  margin-bottom:8px;
  opacity:0.8;
}

button{
  cursor:pointer;
}

.primary-btn{
  width:100%;
  padding:14px;
  border:1px solid #6b1f2b;
  background:transparent;
  color:#6b1f2b;
}

.primary-btn:hover{
  background:#6b1f2b;
  color:white;
}
</style>
</head>

<body>

<h2>Book Ticket</h2>

<form id="form">

<!-- CALENDAR -->
<div class="block">

  <div class="calendar-header">
    <span id="month"></span>
    <span id="year"></span>
  </div>

  <div class="calendar" id="calendar"></div>

  <input type="hidden" name="date" id="date">
</div>

<!-- TIME -->
<div class="block">
  <select id="time" name="time" required style="width:100%;border:none;">
    <option value="">Select time</option>
  </select>
</div>

<!-- TICKETS -->
<div class="block">

  <div class="small-label">Tickets</div>

  <div class="counter">
    <button type="button" id="minus">–</button>
    <span id="count">1</span>
    <button type="button" id="plus">+</button>

    <input type="hidden" name="tickets" id="tickets" value="1">
  </div>

</div>

<!-- EMAIL -->
<div class="block">
  <input type="email" name="email" id="email" placeholder="Email"
  style="width:100%;border:none;outline:none;">
</div>

<button class="primary-btn" type="submit">Buy Ticket</button>

</form>

<script>
const calendar = document.getElementById("calendar");
const dateInput = document.getElementById("date");
const time = document.getElementById("time");

const monthEl = document.getElementById("month");
const yearEl = document.getElementById("year");

let count = 1;

// ----------------------
// HEADER (MONTH + YEAR)
// ----------------------
const now = new Date();
const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

monthEl.innerText = months[now.getMonth()];
yearEl.innerText = now.getFullYear();

// ----------------------
// CALENDAR
// ----------------------
function generateCalendar(){
  const today = new Date();

  for(let i=0;i<30;i++){
    const d = new Date();
    d.setDate(today.getDate()+i);

    const dayNum = d.getDay();

    const el = document.createElement("div");
    el.classList.add("day");

    el.innerText = d.getDate();

    el.dataset.date = d.toISOString().split("T")[0];
    el.dataset.day = dayNum;

    if(dayNum === 6 || dayNum === 0){
      el.classList.add("allowed");
    } else {
      el.classList.add("disabled");
    }

    el.onclick = () => {

      if(!(dayNum === 6 || dayNum === 0)) return;

      document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");

      dateInput.value = el.dataset.date;

      updateTime(dayNum);
    };

    calendar.appendChild(el);
  }
}

generateCalendar();

// ----------------------
// TIME
// ----------------------
function updateTime(day){
  time.innerHTML = '<option value="">Select time</option>';

  let slots = [];

  if(day === 6){
    slots = ["10:00","16:00"];
  }

  if(day === 0){
    slots = ["14:00"];
  }

  slots.forEach(t=>{
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    time.appendChild(o);
  });
}

// ----------------------
// TICKETS (1–10)
// ----------------------
document.getElementById("plus").onclick = () => {
  if(count < 10){
    count++;
    update();
  }
};

document.getElementById("minus").onclick = () => {
  if(count > 1){
    count--;
    update();
  }
};

function update(){
  document.getElementById("count").innerText = count;
  document.getElementById("tickets").value = count;
}

// ----------------------
// SUBMIT
// ----------------------
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const payload = {
    date: dateInput.value,
    time: time.value,
    tickets: count,
    email: document.getElementById("email").value
  };

  const res = await fetch("/api/create-checkout", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  }
});
</script>

</body>
</html>
