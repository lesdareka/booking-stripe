<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
  font-family: Helvetica, Arial, sans-serif;
  color:#6b1f2b;
  max-width:460px;
  margin:40px auto;
}

h2{
  margin-bottom:20px;
}

/* SECTION */
.block{
  margin-bottom:18px;
}

/* LABEL */
.label{
  font-size:13px;
  margin-bottom:8px;
  opacity:0.8;
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

/* TIME CHIPS (Airbnb style) */
.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  padding:10px 14px;
  border:1px solid #ddd;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.chip:hover{
  border-color:#6b1f2b;
}

.chip.active{
  background:#6b1f2b;
  color:white;
  border-color:#6b1f2b;
}

/* TICKETS */
.counter{
  display:flex;
  align-items:center;
  gap:12px;
}

.counter button{
  width:34px;
  height:34px;
  border:1px solid #ddd;
  border-radius:50%;
  background:white;
  cursor:pointer;
  font-size:18px;
}

/* BUTTON */
.primary-btn{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:10px;
  border:1px solid #6b1f2b;
  background:#6b1f2b;
  color:white;
  cursor:pointer;
}

.primary-btn:hover{
  opacity:0.9;
}

/* Flatpickr Airbnb style */
.flatpickr-calendar{
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.flatpickr-day.selected{
  background:#6b1f2b;
  border-color:#6b1f2b;
}

.flatpickr-day.disabled{
  opacity:0.2;
}
</style>
</head>

<body>

<h2>Book your ticket</h2>

<form id="form">

<!-- DATE -->
<div class="block">
  <div class="label">Date</div>
  <input type="text" id="date" class="input" placeholder="Select date">
</div>

<!-- TIME -->
<div class="block">
  <div class="label">Time</div>
  <div class="chips" id="timeSlots"></div>
  <input type="hidden" id="time">
</div>

<!-- TICKETS -->
<div class="block">
  <div class="label">Guests</div>

  <div class="counter">
    <button type="button" id="minus">–</button>
    <span id="count">1</span>
    <button type="button" id="plus">+</button>
  </div>

  <input type="hidden" id="tickets" value="1">
</div>

<!-- EMAIL -->
<div class="block">
  <div class="label">Email</div>
  <input type="email" id="email" class="input" placeholder="you@email.com">
</div>

<button class="primary-btn" type="submit">Reserve & Pay</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

let selectedTime = null;

// --------------------
// CALENDAR (Airbnb feel)
// --------------------
flatpickr("#date", {
  minDate: "today",
  dateFormat: "Y-m-d",
  disable: [
    function(date) {
      return (date.getDay() !== 6 && date.getDay() !== 0);
    }
  ],
  onChange: function(selectedDates){
    const d = selectedDates[0];
    if(!d) return;

    const day = d.getDay();
    renderTimes(day);
  }
});

// --------------------
// TIME SLOTS (chips)
// --------------------
function renderTimes(day){
  const container = document.getElementById("timeSlots");
  container.innerHTML = "";
  selectedTime = null;

  let slots = [];

  if(day === 6) slots = ["10:00", "16:00"];
  if(day === 0) slots = ["14:00"];

  slots.forEach(t => {
    const el = document.createElement("div");
    el.className = "chip";
    el.innerText = t;

    el.onclick = () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      el.classList.add("active");
      selectedTime = t;
      document.getElementById("time").value = t;
    };

    container.appendChild(el);
  });
}

// --------------------
// GUESTS (1–10)
// --------------------
let count = 1;

document.getElementById("plus").onclick = () => {
  if(count < 10){
    count++;
    update();
  }
};

document.getElementById("minus").onclick = () => {
  if(count > 1){
    count--;
    update();
  }
};

function update(){
  document.getElementById("count").innerText = count;
  document.getElementById("tickets").value = count;
}

// --------------------
// SUBMIT
// --------------------
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const payload = {
    date: document.getElementById("date").value,
    time: selectedTime,
    tickets: count,
    email: document.getElementById("email").value
  };

  const res = await fetch("/api/create-checkout", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  }
});

});
</script>

</body>
</html>
