<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<style>
/* ===== PAGE LAYOUT ===== */
body{
  font-family: Helvetica, Arial, sans-serif;
  color:#6b1f2b;
  margin:0;
  min-height:100vh;

  /* центрирование на desktop */
  display:flex;
  align-items:center;
  justify-content:center;

  background:#fff;
}

/* форма */
form{
  width:100%;
  max-width:460px;
  padding:20px;
}

/* ===== BLOCKS ===== */
.block{ margin-bottom:16px; }

.label{
  font-size:13px;
  margin-bottom:6px;
  opacity:0.7;
}

/* ===== DAY SELECTOR ===== */
.days{
  display:flex;
  gap:10px;
}

.day{
  flex:1;
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.day.active{
  background:#6b1f2b;
  color:white;
  border-color:#6b1f2b;
}

/* ===== INPUT ===== */
.input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  box-sizing:border-box;
}

/* ===== TIME ===== */
.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  padding:10px 14px;
  border:1px solid #ddd;
  border-radius:20px;
  cursor:pointer;
}

.chip.active{
  background:#6b1f2b;
  color:white;
}

/* ===== COUNTER ===== */
.counter{
  display:flex;
  gap:10px;
  align-items:center;
}

button{
  cursor:pointer;
  min-width:44px;
  min-height:44px;
  background:none;
  border:none;
  font-size:18px;
}

/* ===== BUTTON ===== */
.primary-btn{
  width:100%;
  padding:14px;
  background:#6b1f2b;
  color:white;
  border:none;
  border-radius:10px;
  margin-top:20px;
  font-size:16px;
}

/* ===== MOBILE ===== */
@media (max-width: 600px){

  body{
    align-items:flex-start;
    padding:16px;
  }

  form{
    max-width:100%;
    padding:0;
  }

  .days{
    flex-direction:column;
  }

  .chip{
    font-size:14px;
  }
}
</style>
</head>

<body>

<form id="form">

<!-- STEP 1 -->
<div class="block">
  <div class="label">Choose day</div>

  <div class="days">
    <div class="day" id="sat">Saturday</div>
    <div class="day" id="sun">Sunday</div>
  </div>
</div>

<!-- STEP 2 -->
<div class="block">
  <div class="label">Date</div>
  <input id="date" class="input" type="date" disabled>
</div>

<!-- TIME -->
<div class="block">
  <div class="label">Time</div>
  <div class="chips" id="timeSlots"></div>
  <input type="hidden" id="time">
</div>

<!-- TICKETS -->
<div class="block">
  <div class="label">Tickets (1–10)</div>

  <div class="counter">
    <button type="button" id="minus">-</button>
    <span id="count">1</span>
    <button type="button" id="plus">+</button>
  </div>

  <input type="hidden" id="tickets" value="1">
</div>

<!-- EMAIL -->
<div class="block">
  <div class="label">Email</div>
  <input id="email" class="input" type="email">
</div>

<button class="primary-btn" type="submit">Pay</button>

</form>

<script>
let selectedDay = null;
let selectedTime = null;
let count = 1;

const dateInput = document.getElementById("date");

// DAY SELECT
document.getElementById("sat").onclick = () => {
  selectDay("sat");
  enableDate(6);
};

document.getElementById("sun").onclick = () => {
  selectDay("sun");
  enableDate(0);
};

function selectDay(type){
  document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
  document.getElementById(type).classList.add("active");
}

// ENABLE DATE
function enableDate(dayType){
  selectedDay = dayType;

  dateInput.disabled = false;
  dateInput.value = "";
  document.getElementById("timeSlots").innerHTML = "";
  selectedTime = null;

  dateInput.onchange = () => {
    const d = new Date(dateInput.value);
    const day = d.getDay();

    if(dayType === 6 && day !== 6){
      alert("Only Saturday allowed");
      dateInput.value = "";
      return;
    }

    if(dayType === 0 && day !== 0){
      alert("Only Sunday allowed");
      dateInput.value = "";
      return;
    }

    renderTimes(day);
  };
}

// TIME
function renderTimes(day){
  const box = document.getElementById("timeSlots");
  box.innerHTML = "";

  let slots = [];

  if(day === 6) slots = ["10:00", "16:00"];
  if(day === 0) slots = ["14:00"];

  slots.forEach(t=>{
    const el = document.createElement("div");
    el.className="chip";
    el.textContent=t;

    el.onclick=()=>{
      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      el.classList.add("active");
      selectedTime=t;
      document.getElementById("time").value=t;
    };

    box.appendChild(el);
  });
}

// TICKETS
document.getElementById("plus").onclick=()=>{
  if(count<10){
    count++;
    document.getElementById("count").textContent=count;
    document.getElementById("tickets").value=count;
  }
};

document.getElementById("minus").onclick=()=>{
  if(count>1){
    count--;
    document.getElementById("count").textContent=count;
    document.getElementById("tickets").value=count;
  }
};

// SUBMIT
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  if(!selectedDay || !dateInput.value || !selectedTime){
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/api/create-checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      date: dateInput.value,
      time: selectedTime,
      tickets: count,
      email: document.getElementById("email").value
    })
  });

  const data = await res.json();
  if(data.url) window.location.href=data.url;
});
</script>

</body>
</html>
