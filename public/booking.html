<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
  font-family: Helvetica, Arial, sans-serif;
  color:#6b1f2b;
  max-width:420px;
  margin:40px auto;
}

h2{margin-bottom:20px;}

.block{
  border-bottom:1px solid #6b1f2b;
  padding:16px 0;
}

/* tickets */
.counter{
  display:flex;
  gap:12px;
  align-items:center;
}

.small-label{
  font-size:13px;
  margin-bottom:8px;
  opacity:0.8;
}

button{
  cursor:pointer;
  background:none;
  border:none;
  font-size:18px;
  color:#6b1f2b;
}

.primary-btn{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:1px solid #6b1f2b;
  background:transparent;
  color:#6b1f2b;
  cursor:pointer;
}

.primary-btn:hover{
  background:#6b1f2b;
  color:white;
}
</style>
</head>

<body>

<h2>Book Ticket</h2>

<form id="form">

<!-- DATE -->
<div class="block">
  <input type="text" id="date" placeholder="Select date"
  style="width:100%;border:none;outline:none;">
</div>

<!-- TIME -->
<div class="block">
  <select id="time" name="time" required style="width:100%;border:none;outline:none;">
    <option value="">Select time</option>
  </select>
</div>

<!-- TICKETS -->
<div class="block">
  <div class="small-label">Tickets</div>

  <div class="counter">
    <button type="button" id="minus">–</button>
    <span id="count">1</span>
    <button type="button" id="plus">+</button>
  </div>

  <input type="hidden" id="tickets" value="1">
</div>

<!-- EMAIL -->
<div class="block">
  <input type="email" id="email" placeholder="Email"
  style="width:100%;border:none;outline:none;">
</div>

<button class="primary-btn" type="submit">Buy Ticket</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
// --------------------
// FLATPICKR
// --------------------
flatpickr("#date", {
  minDate: "today",
  dateFormat: "Y-m-d",

  disable: [
    function(date) {
      return (date.getDay() !== 6 && date.getDay() !== 0);
    }
  ],

  onChange: function(selectedDates) {
    const d = selectedDates[0];
    if (!d) return;

    const day = d.getDay();
    updateTime(day);
  }
});

// --------------------
// TIME
// --------------------
function updateTime(day){
  const time = document.getElementById("time");
  time.innerHTML = '<option value="">Select time</option>';

  if(day === 6){
    add("10:00");
    add("16:00");
  }

  if(day === 0){
    add("14:00");
  }

  function add(t){
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    time.appendChild(o);
  }
}

// --------------------
// TICKETS (1–10)
// --------------------
let count = 1;

document.getElementById("plus").onclick = () => {
  if(count < 10){
    count++;
    update();
  }
};

document.getElementById("minus").onclick = () => {
  if(count > 1){
    count--;
    update();
  }
};

function update(){
  document.getElementById("count").innerText = count;
  document.getElementById("tickets").value = count;
}

// --------------------
// SUBMIT → STRIPE
// --------------------
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const payload = {
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    tickets: count,
    email: document.getElementById("email").value
  };

  const res = await fetch("/api/create-checkout", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  }
});
</script>

</body>
</html>
