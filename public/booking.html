<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<style>
body{
  font-family: Helvetica, Arial, sans-serif;
  color:#3C0008;
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#F8F7F3;
}

form{
  width:100%;
  max-width:460px;
  padding:20px;
}

.block{ margin-bottom:16px; }

.label{
  font-size:13px;
  margin-bottom:6px;
  opacity:0.7;
}

.days{
  display:flex;
  gap:10px;
}

.day{
  flex:1;
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.day.active{
  background:#6b1f2b;
  color:white;
  border-color:#6b1f2b;
}

.input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  box-sizing:border-box;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  padding:10px 14px;
  border:1px solid #ddd;
  border-radius:20px;
  cursor:pointer;
}

.chip.active{
  background:#6b1f2b;
  color:white;
}

.counter{
  display:flex;
  gap:10px;
  align-items:center;
}

button{
  cursor:pointer;
  min-width:44px;
  min-height:44px;
  background:none;
  border:none;
  font-size:18px;
}

.primary-btn{
  width:100%;
  padding:14px;
  background:#6b1f2b;
  color:white;
  border:none;
  border-radius:10px;
  margin-top:20px;
  font-size:16px;
}

.policy{
  display:flex;
  gap:10px;
  align-items:flex-start;
  font-size:13px;
  line-height:1.4;
}

.policy a{
  color:#6b1f2b;
  text-decoration:underline;
}

@media (max-width:600px){
  body{
    align-items:flex-start;
    padding:16px;
  }
  form{
    max-width:100%;
    padding:0;
  }
  .days{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<form id="form">

  <div class="block">
    <div class="label">Choose day</div>
    <div class="days">
      <div class="day" id="sat">Saturday</div>
      <div class="day" id="sun">Sunday</div>
    </div>
  </div>

  <div class="block">
    <div class="label">Date</div>
    <input id="date" class="input" type="date" disabled>
  </div>

  <div class="block">
    <div class="label">Time</div>
    <div class="chips" id="timeSlots"></div>
    <input type="hidden" id="time">
  </div>

  <div class="block">
    <div class="label">Tickets (1–10)</div>
    <div class="counter">
      <button type="button" id="minus">-</button>
      <span id="count">1</span>
      <button type="button" id="plus">+</button>
    </div>
    <input type="hidden" id="tickets" value="1">
  </div>

  <div class="block">
    <div class="label">First name</div>
    <input id="firstName" class="input" type="text">
  </div>

  <div class="block">
    <div class="label">Last name</div>
    <input id="lastName" class="input" type="text">
  </div>

  <div class="block">
    <div class="label">Email</div>
    <input id="email" class="input" type="email">
  </div>

  <div class="block policy">
    <input type="checkbox" id="policy">
    <label for="policy">
      I understand the
      <a href="https://remussance.com/refund_policy" target="_blank">
        cancellation policy
      </a>
      for guided tours
    </label>
  </div>

  <button class="primary-btn" type="submit">Pay</button>

</form>

<script>
let selectedDay = null;
let selectedTime = null;
let count = 1;

const form = document.getElementById("form");
const dateInput = document.getElementById("date");
const timeBox = document.getElementById("timeSlots");
const timeHidden = document.getElementById("time");
const ticketsHidden = document.getElementById("tickets");
const countEl = document.getElementById("count");

// =====================
// DAY
// =====================
document.getElementById("sat").onclick = () => setDay(6);
document.getElementById("sun").onclick = () => setDay(0);

function setDay(day) {
  selectedDay = day;

  document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
  document.getElementById(day === 6 ? "sat" : "sun").classList.add("active");

  dateInput.disabled = false;
  dateInput.value = "";

  timeBox.innerHTML = "";
  selectedTime = null;
  timeHidden.value = "";
}

// =====================
// DATE
// =====================
dateInput.addEventListener("input", () => {
  if (!dateInput.value || selectedDay === null) return;

  const [y, m, d] = dateInput.value.split("-").map(Number);
  const date = new Date(y, m - 1, d);

  if (date.getDay() !== selectedDay) {
    dateInput.value = "";
    timeBox.innerHTML = "";
    selectedTime = null;
    return;
  }

  renderTimes(selectedDay);
});

// =====================
// TIMES
// =====================
function renderTimes(day) {
  timeBox.innerHTML = "";

  let slots = [];
  if (day === 6) slots = ["10:00", "16:00"];
  if (day === 0) slots = ["14:00"];

  slots.forEach(time => {
    const el = document.createElement("div");
    el.className = "chip";
    el.textContent = time;

    el.onclick = () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      el.classList.add("active");

      selectedTime = time;
      timeHidden.value = time;
    };

    timeBox.appendChild(el);
  });
}

// =====================
// COUNTER
// =====================
document.getElementById("plus").onclick = () => {
  if (count < 10) {
    count++;
    updateCount();
  }
};

document.getElementById("minus").onclick = () => {
  if (count > 1) {
    count--;
    updateCount();
  }
};

function updateCount() {
  countEl.textContent = count;
  ticketsHidden.value = count;
}

// =====================
// SUBMIT
// =====================
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const email = document.getElementById("email").value.trim();

  if (
    selectedDay === null ||
    !dateInput.value ||
    !selectedTime ||
    !firstName ||
    !lastName ||
    !email
  ) {
    alert("Fill all fields");
    return;
  }

  if (!document.getElementById("policy").checked) {
    alert("Please accept the cancellation policy");
    return;
  }

  const res = await fetch("/api/create-checkout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      firstName,
      lastName,
      email,
      date: dateInput.value,
      time: selectedTime,
      tickets: count
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "No spots left");
    return;
  }

  window.location.href = data.url;
});
</script>

</body>
</html>
